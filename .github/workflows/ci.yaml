---

name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  prek:
    name: prek
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: stable
          components: clippy
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: nightly
          components: rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: |
            wanikani-apprentice
      - uses: j178/prek-action@6ad80277337ad479fe43bd70701c3f7f8aa74db3  # v2.0.3

  files-changed:
    name: Detect which files changed
    runs-on: ubuntu-latest

    outputs:
      python-projects: ${{ steps.projects.outputs.python}}
      wanikani-apprentice: ${{ steps.filter.outputs.wanikani-apprentice }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d  # v4.0.1
        id: filter
        with:
          list-files: json
          filters: |
            python:
              - 'anki-extract-kanji/**'
              - 'anki-newlines-to-br/**'
              - 'shirabe-jisho-to-anki/**'
              - 'wanikani-burnt-kanji-to-anki/**'
            wanikani-apprentice:
              - 'wanikani-apprentice/**'
      - name: Extract Python project names
        id: projects
        run: |
          set -ex
          echo '${{ steps.filter.outputs.python_files }}' | jq -c 'map(split("/")[0]) | unique' > projects.json
          echo "python=$(cat projects.json)" >> $GITHUB_OUTPUT

  python:
    needs: files-changed
    if: needs.files-changed.outputs.python-projects != '[]'
    name: ${{ matrix.project }} (${{ matrix.toxenv }})
    runs-on: ubuntu-latest
    env:
      TOXENV: ${{ matrix.toxenv }}

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJSON(needs.files-changed.outputs.python-projects )}}
        toxenv:
          - py,test-coverage
          - mypy

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Generate the cache suffix
        id: cache-suffix
        run: |
          echo cache-suffix=${TOXENV//,/-} >> $GITHUB_OUTPUT
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ${{ matrix.project }}/pyproject.toml
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          working-directory: ${{ matrix.project }}
          cache-suffix: ${{ steps.cache-suffix.outputs.cache-suffix }}
      - name: tox
        run: uvx tox -c ${{ matrix.project }}

  wanikani-apprentice:
    needs: files-changed
    if: needs.files-changed.outputs.wanikani-apprentice == 'true'
    name: wanikani-apprentice build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@7ea35f098a7369cd23488403f58be9c491a6c55f  # v2.77.0
      - name: Install cargo-nextest
        uses: taiki-e/install-action@7ea35f098a7369cd23488403f58be9c491a6c55f  # v2.77.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4  # v2.9.1
        with:
          workspaces: |
            wanikani-apprentice
      - name: Run tests
        run: cd wanikani-apprentice && cargo llvm-cov nextest --no-fail-fast --html --color=always
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-report
          path: wanikani-apprentice/target/llvm-cov/html

  wanikani-apprentice-deploy:
    needs:
      - wanikani-apprentice
      - prek
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    name: wanikani-apprentice deploy
    runs-on: ubuntu-latest

    environment:
      name: wanikani-apprentice-prod
      url: https://wk-apprentice.rouge8.com
    concurrency: wanikani-apprentice-prod

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1  # 1.6
      - run: cd wanikani-apprentice && flyctl deploy --remote-only --env SENTRY_RELEASE=$(git describe --always --abbrev=40)
        env:
          FLY_API_TOKEN: ${{ secrets.WANIKANI_APPRENTICE_FLY_API_TOKEN }}
      - name: Sentry Release
        uses: getsentry/action-release@5657c9e888b4e2cc85f4d29143ea4131fde4a73a  # v3.6.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: rouge8
          SENTRY_PROJECT: wanikani-apprentice
        with:
          environment: prod

  combined-results:
    needs:
      - prek
      - python
      - wanikani-apprentice
    if: always()
    name: Combined result
    runs-on: ubuntu-latest

    steps:
      - name: Check for failures
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "One or more jobs have failed!" && exit 1
